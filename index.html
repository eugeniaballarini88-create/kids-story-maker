<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Maker ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --cream: #fdf8f0;
    --brown: #8b5e3c;
    --dark: #3d2b1f;
    --accent: #e8763a;
    --soft: #c9a87c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; color: var(--dark); }

  /* FORM */
  #form-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .form-card { background: white; border-radius: 24px; padding: 2.5rem 2rem; width: 100%; max-width: 500px; box-shadow: 0 8px 40px rgba(139,94,60,0.12); }
  .form-header { text-align: center; margin-bottom: 2rem; }
  .form-emoji { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
  .form-title { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--dark); margin-bottom: 0.4rem; }
  .form-subtitle { color: var(--soft); font-size: 0.85rem; line-height: 1.5; }
  .field { margin-bottom: 1.2rem; }
  label { display: block; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); margin-bottom: 0.4rem; }
  input, select, textarea { width: 100%; padding: 0.75rem 1rem; border: 2px solid #ede5d8; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 0.95rem; color: var(--dark); background: var(--cream); transition: border-color 0.2s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: white; }
  textarea { resize: none; height: 80px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  .generate-btn { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(232,118,58,0.35); margin-top: 0.5rem; }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,118,58,0.4); }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .error-box { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 12px; padding: 1rem; color: #c0392b; font-size: 0.9rem; margin-top: 1rem; display: none; line-height: 1.5; }
  .blocked-box { background: #fff8f0; border: 1px solid #f0c8a0; border-radius: 12px; padding: 1rem; color: #8b5e3c; font-size: 0.9rem; margin-top: 1rem; display: none; line-height: 1.5; }

  /* STORY MODE TOGGLE */
  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: 1.2rem; border: 2px solid #ede5d8; border-radius: 12px; overflow: hidden; }
  .mode-btn { padding: 0.75rem 0.5rem; border: none; background: var(--cream); font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--soft); cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.3; }
  .mode-btn:first-child { border-right: 1px solid #ede5d8; }
  .mode-btn.active { background: var(--accent); color: white; }
  .mode-hint { font-size: 0.78rem; color: var(--soft); margin-top: -0.8rem; margin-bottom: 1.2rem; line-height: 1.4; padding: 0 0.2rem; }
  .field.dimmed label { color: #ccc; }
  .field.dimmed input { color: #bbb; border-color: #f0ebe3; background: #faf7f3; }

  /* LOADING */
  #loading-screen { display: none; min-height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; }
  .loading-book { font-size: 4rem; animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .loading-text { font-family: 'Lora', serif; font-size: 1.3rem; color: var(--brown); }
  .loading-dots::after { content: ''; animation: dots 1.5s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  .progress-bar-wrap { width: 260px; height: 6px; background: #ede5d8; border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width 0.5s ease; }
  .progress-label { font-size: 0.8rem; color: var(--soft); text-align: center; }

  /* BOOK SCREEN */
  #book-screen { display: none; background: #e8e0d8; min-height: 100vh; padding: 2rem 1rem 4rem; }
  .book-topbar { display: flex; justify-content: space-between; align-items: center; max-width: 640px; margin: 0 auto 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
  .back-btn { background: white; border: 2px solid #ede5d8; border-radius: 10px; padding: 0.5rem 1rem; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--brown); cursor: pointer; transition: border-color 0.2s; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .book-title-bar { font-family: 'Lora', serif; font-size: 1rem; color: var(--dark); font-style: italic; text-align: center; flex: 1; }
  .pdf-note { font-size: 0.75rem; color: #999; text-align: center; max-width: 640px; margin: 0 auto 1rem; }

  /* BOOK PAGES */
  .book-pages { max-width: 640px; margin: 0 auto; }
  .book-page { background: white; border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.15), 2px 2px 0 #d4c9bc; margin-bottom: 2rem; overflow: hidden; display: flex; flex-direction: column; }

  /* Cover */
  .cover-img-wrap { height: 360px; overflow: hidden; background: linear-gradient(135deg,#fde8c8,#c8e6f5); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
  .cover-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover-text-band { background: var(--dark); padding: 1.5rem 2rem; text-align: center; }
  .cover-book-title { font-family: 'Lora', serif; font-size: 1.6rem; color: white; line-height: 1.2; margin-bottom: 0.3rem; }
  .cover-book-sub { color: rgba(255,255,255,0.65); font-size: 0.8rem; }

  /* Story pages */
  .story-page-card { display: grid; grid-template-columns: 220px 1fr; min-height: 200px; }
  .story-page-card:nth-child(even) { grid-template-columns: 1fr 220px; }
  .story-page-card:nth-child(even) .story-img-wrap { order: 2; }
  .story-page-card:nth-child(even) .story-text-band { order: 1; border-left: none; border-right: 3px solid var(--accent); }
  .story-img-wrap { overflow: hidden; background: linear-gradient(135deg,#fde8c8,#d4eef8); display: flex; align-items: center; justify-content: center; position: relative; min-height: 200px; font-size: 2.5rem; }
  .story-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.5s; position: absolute; inset: 0; }
  .story-img-wrap img.loaded { opacity: 1; }
  .story-img-wrap .img-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: linear-gradient(135deg,#fde8c8,#d4eef8); transition: opacity 0.5s; }
  .story-img-wrap .img-placeholder.hidden { opacity: 0; pointer-events: none; }
  .story-text-band { padding: 1.5rem 1.8rem; display: flex; flex-direction: column; justify-content: center; border-left: 3px solid var(--accent); }
  .story-page-num { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--soft); margin-bottom: 0.5rem; }
  .story-page-text { font-family: 'Lora', serif; font-size: 1rem; line-height: 1.8; color: var(--dark); }

  /* End page */
  .end-page { background: var(--accent); padding: 3rem 2rem; text-align: center; }
  .end-page h2 { font-family: 'Lora', serif; font-size: 2.2rem; color: white; margin-bottom: 0.4rem; }
  .end-page p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }

  .new-story-btn { display: block; width: 100%; max-width: 300px; margin: 0 auto; padding: 1rem; background: var(--dark); color: white; border: none; border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; text-align: center; }
  .new-story-btn:hover { opacity: 0.85; }

  @media (max-width: 520px) {
    .story-page-card, .story-page-card:nth-child(even) { grid-template-columns: 1fr; }
    .story-page-card:nth-child(even) .story-img-wrap { order: 1; }
    .story-page-card:nth-child(even) .story-text-band { order: 2; border-right: none; border-left: 3px solid var(--accent); }
    .story-img-wrap { min-height: 160px; }
    .cover-img-wrap { height: 240px; }
  }
</style>
</head>
<body>

<!-- FORM -->
<div id="form-screen">
  <div class="form-card">
    <div class="form-header">
      <span class="form-emoji">📖</span>
      <h1 class="form-title">Story Maker</h1>
      <p class="form-subtitle">A personalised story creation tool for parents of children aged 0–5</p>
    </div>

    <!-- STORY MODE TOGGLE -->
    <div class="field">
      <label>Story Style</label>
      <div class="mode-toggle">
        <button type="button" class="mode-btn active" id="mode-personal" onclick="setMode('personal')">👤 My child is the hero<br><span style="font-weight:400;font-size:0.75rem;">Uses your child's name</span></button>
        <button type="button" class="mode-btn" id="mode-fictional" onclick="setMode('fictional')">🐻 A fictional character<br><span style="font-weight:400;font-size:0.75rem;">Animal or fantasy hero</span></button>
      </div>
      <p class="mode-hint" id="mode-hint">The story will feature your child as the main character.</p>
    </div>

    <div class="row">
      <div class="field" id="name-field">
        <label>Child's Name</label>
        <input type="text" id="child-name" placeholder="e.g. Sofia" />
      </div>
      <div class="field">
        <label>Age</label>
        <select id="age">
          <option value="0-1">0–1 year</option>
          <option value="2-3">2–3 years</option>
          <option value="4-5" selected>4–5 years</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Gender</label>
      <select id="gender">
        <option value="girl">Girl</option>
        <option value="boy">Boy</option>
        <option value="neutral">Prefer not to say</option>
      </select>
    </div>

    <div class="field">
      <label>Story Topic / Theme</label>
      <textarea id="topic" placeholder="e.g. welcoming a new baby brother, starting nursery for the first time, feeling worried about moving to a new house..."></textarea>
    </div>

    <div class="field">
      <label>Moral or Lesson <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <input type="text" id="moral" placeholder="e.g. change can be exciting, it's okay to feel scared" />
    </div>

    <div class="field">
      <label>Story Length</label>
      <select id="pages">
        <option value="6">6 pages — Quick bedtime story</option>
        <option value="8" selected>8 pages — Classic storybook</option>
        <option value="10">10 pages — Full adventure</option>
      </select>
    </div>

    <button class="generate-btn" onclick="generateStory()">✨ Create My Story</button>
    <div class="error-box" id="error-box"></div>
    <div class="blocked-box" id="blocked-box"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-book">📖</div>
  <div class="loading-text">Writing your story<span class="loading-dots"></span></div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label">Checking your topic...</div>
</div>

<!-- BOOK -->
<div id="book-screen">
  <div class="book-topbar">
    <button class="back-btn" onclick="goBack()">← New Story</button>
    <div class="book-title-bar" id="book-title-bar"></div>
  </div>
  <p class="pdf-note">💡 Images load one by one — wait for all to appear before saving as PDF</p>
  <div class="book-pages" id="page-container"></div>
  <button class="new-story-btn" onclick="goBack()" style="margin-top:1rem;">✨ Create Another Story</button>
</div>

<script>
const IMG_STYLE = "watercolor illustration, children's picture book, soft pastel colors, whimsical, warm, gentle brushstrokes, no text, no words, child-safe";
const EMOJIS = ['🌟','🌈','🌸','🦋','🌿','⭐','🐣','🍀','🌻','🦄','🐬','🌙','🎈','🦊','🐧'];

function show(id) {
  ['form-screen','loading-screen','book-screen'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = s === id ? (s === 'book-screen' ? 'block' : 'flex') : 'none';
  });
}

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

function showError(msg) {
  document.getElementById('error-box').textContent = msg;
  document.getElementById('error-box').style.display = 'block';
  document.getElementById('blocked-box').style.display = 'none';
}

function showBlocked(msg) {
  document.getElementById('blocked-box').innerHTML = '🌟 ' + msg;
  document.getElementById('blocked-box').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';
}

function imgUrl(prompt, seed) {
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', ' + IMG_STYLE)}?width=800&height=500&nologo=true&seed=${seed || Math.floor(Math.random()*99999)}`;
}

let storyMode = 'personal';

function setMode(mode) {
  storyMode = mode;
  const nameField = document.getElementById('name-field');
  const hint = document.getElementById('mode-hint');
  const personalBtn = document.getElementById('mode-personal');
  const fictionalBtn = document.getElementById('mode-fictional');

  if (mode === 'personal') {
    personalBtn.classList.add('active');
    fictionalBtn.classList.remove('active');
    nameField.classList.remove('dimmed');
    document.getElementById('child-name').placeholder = 'e.g. Sofia';
    hint.textContent = 'The story will feature your child as the main character.';
  } else {
    fictionalBtn.classList.add('active');
    personalBtn.classList.remove('active');
    nameField.classList.add('dimmed');
    document.getElementById('child-name').placeholder = 'Optional — not used in story';
    hint.textContent = 'Claude will invent a warm animal or fantasy character. Your child will see themselves in the story without being named.';
  }
}

async function generateStory() {
  const name     = document.getElementById('child-name').value.trim() || 'your little one';
  const age      = document.getElementById('age').value;
  const gender   = document.getElementById('gender').value;
  const topic    = document.getElementById('topic').value.trim();
  const moral    = document.getElementById('moral').value.trim();
  const pages    = document.getElementById('pages').value;

  document.getElementById('error-box').style.display = 'none';
  document.getElementById('blocked-box').style.display = 'none';

  if (!topic) {
    showError('Please enter a story topic or theme before continuing.');
    return;
  }

  document.querySelector('.generate-btn').disabled = true;
  show('loading-screen');
  setProgress(10, 'Checking your topic...');

  try {
    setProgress(30, 'Writing your story...');

    const res = await fetch('/.netlify/functions/story', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, age, gender, topic, moral, pages, mode: storyMode })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }

    const data = await res.json();

    // Handle blocked topics
    if (data.blocked) {
      show('form-screen');
      document.querySelector('.generate-btn').disabled = false;
      showBlocked(data.reason);
      return;
    }

    const story = data;
    if (!story.title || !story.pages?.length) throw new Error('Incomplete story received. Please try again.');

    setProgress(80, 'Building your book...');

    const container = document.getElementById('page-container');
    container.innerHTML = '';
    document.getElementById('book-title-bar').textContent = story.title;

    // Cover
    const cover = document.createElement('div');
    cover.className = 'book-page';
    const coverImgWrap = document.createElement('div');
    coverImgWrap.className = 'cover-img-wrap';
    coverImgWrap.textContent = '📖';
    const coverImg = document.createElement('img');
    coverImg.id = 'cover-img';
    coverImg.alt = 'Cover';
    coverImgWrap.appendChild(coverImg);
    const coverBand = document.createElement('div');
    coverBand.className = 'cover-text-band';
    coverBand.innerHTML = `<div class="cover-book-title">${story.title}</div><div class="cover-book-sub">A story for ${name} ✨</div>`;
    cover.appendChild(coverImgWrap);
    cover.appendChild(coverBand);
    container.appendChild(cover);

    // Pages
    story.pages.forEach((page, i) => {
      const pageEl = document.createElement('div');
      pageEl.className = 'book-page story-page-card';

      const imgWrap = document.createElement('div');
      imgWrap.className = 'story-img-wrap';
      imgWrap.dataset.prompt = page.imagePrompt;
      imgWrap.dataset.index = i;
      const placeholder = document.createElement('div');
      placeholder.className = 'img-placeholder';
      placeholder.textContent = '🎨';
      const img = document.createElement('img');
      img.alt = `Page ${i+1}`;
      imgWrap.appendChild(placeholder);
      imgWrap.appendChild(img);

      const textBand = document.createElement('div');
      textBand.className = 'story-text-band';
      textBand.innerHTML = `<div class="story-page-num">Page ${i+1}</div><div class="story-page-text">${page.text}</div>`;

      pageEl.appendChild(imgWrap);
      pageEl.appendChild(textBand);
      container.appendChild(pageEl);
    });

    // End page
    const end = document.createElement('div');
    end.className = 'book-page end-page';
    end.innerHTML = `<h2>The End 🌟</h2><p>A story made with love for ${name}</p>`;
    container.appendChild(end);

    setProgress(100, 'Your story is ready!');
    await new Promise(r => setTimeout(r, 400));
    show('book-screen');
    window.scrollTo(0, 0);

    loadImagesSequentially(story, container);

  } catch(err) {
    show('form-screen');
    document.querySelector('.generate-btn').disabled = false;
    showError('Something went wrong. Please try again.');
    console.error(err);
  }
}

async function loadImagesSequentially(story, container) {
  // Cover first
  const coverImg = document.getElementById('cover-img');
  const coverWrap = coverImg?.parentNode;
  if (coverImg) {
    await new Promise(resolve => {
      coverImg.onload = () => { coverImg.classList.add('loaded'); if(coverWrap) coverWrap.textContent = ''; coverWrap.appendChild(coverImg); resolve(); };
      coverImg.onerror = () => resolve();
      coverImg.src = imgUrl(`children's book cover, ${story.title}, ${story.pages[0]?.imagePrompt}`, 9999);
    });
    await new Promise(r => setTimeout(r, 800));
  }

  // Pages one by one
  const imgWraps = container.querySelectorAll('.story-img-wrap');
  for (let i = 0; i < imgWraps.length; i++) {
    const wrap = imgWraps[i];
    const prompt = wrap.dataset.prompt;
    const img = wrap.querySelector('img');
    const ph = wrap.querySelector('.img-placeholder');
    if (!prompt || !img) continue;
    await new Promise(resolve => {
      img.onload = () => { img.classList.add('loaded'); if (ph) ph.classList.add('hidden'); resolve(); };
      img.onerror = () => { if (ph) ph.textContent = EMOJIS[parseInt(wrap.dataset.index) % EMOJIS.length]; resolve(); };
      img.src = imgUrl(prompt, 1000 + i);
    });
    await new Promise(r => setTimeout(r, 800));
  }
}

function goBack() {
  show('form-screen');
  document.querySelector('.generate-btn').disabled = false;
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
